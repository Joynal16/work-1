<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>                                            
          <div class="flex flex-wrap justify-center mt-10">
  <div class="bg-white/10 border border-white/20 rounded-full p-[-3px] flex max-w-md">
    <i class="fa-regular fa-envelope px-4 py-3 text-white"></i>
    <input 
      type="email" 
      placeholder="Enter your email" 
      class="bg-transparent text-white placeholder-white flex-1 px-2 outline-none"
    >
    <button class="bg-orange-500 px-4 py-1 m-1 rounded-full hover:bg-white hover:text-black active:bg-orange-500 transition-colors">
      Subscribe
    </button>
  </div>
</div>                                 
</body>
</html>
